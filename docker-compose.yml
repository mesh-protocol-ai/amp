# AMP — Control Plane + Registry + Matching (Fase 1)
# Uso: docker compose up -d

version: "3.9"

services:
  nats:
    image: nats:2.10-alpine
    container_name: amp-nats
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "-m"
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: amp-postgres
    environment:
      POSTGRES_USER: amp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: amp_registry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deployments/init-db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amp -d amp_registry"]
      interval: 5s
      timeout: 3s
      retries: 5

  registry:
    build:
      context: .
      dockerfile: services/registry/Dockerfile
    container_name: amp-registry
    environment:
      DATABASE_URL: postgres://amp:${POSTGRES_PASSWORD}@postgres:5432/amp_registry?sslmode=disable
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  matching:
    build:
      context: .
      dockerfile: services/matching/Dockerfile
    container_name: amp-matching
    environment:
      NATS_URL: nats://nats:4222
      REGISTRY_URL: http://registry:8080
      BID_WINDOW_MS: "2000"
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET}
    depends_on:
      - nats
      - registry

  # ── Data Plane Relay ───────────────────────────────────────────────────────
  # Bridges provider gRPC servers running behind NAT to public consumers.
  # Providers connect outbound to CONTROL_PORT (7000) and DATA_PORT (7001).
  # Consumers reach providers via the assigned port in PORT_RANGE_START..+SIZE.
  #
  # For EC2 / remote deployments set PUBLIC_HOST to the instance's public IP
  # or DNS name so providers register the correct address in their Agent Card.
  relay:
    build:
      context: .
      dockerfile: services/relay/Dockerfile
    container_name: amp-relay
    environment:
      PUBLIC_HOST: ${RELAY_PUBLIC_HOST:-localhost}
      CONTROL_PORT: "7000"
      DATA_PORT: "7001"
      PORT_RANGE_START: "50100"
      PORT_RANGE_SIZE: "100"
    ports:
      - "7000:7000"         # provider control channel
      - "7001:7001"         # provider data channels
      - "50100-50199:50100-50199"  # consumer gRPC (one port per provider)

volumes:
  nats-data:
  postgres-data:
