name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Generate proto (buf)
        run: |
          docker run --rm -v "$(pwd):/workspace" -w /workspace bufbuild/buf:latest generate

      - name: Tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./pkg/... -count=1 -v
        env:
          # pkg/nats test skip if NATS not available
          NATS_URL: ""

      - name: Vet
        run: go vet ./...
