name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system deps (protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Check protoc
        run: protoc --version

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Build proto crate (generate Rust sources)
        working-directory: sdk/rust/mesh-proto
        run: cargo build -v

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Run tests (fast)
        run: cargo test -p mesh-session -p mesh-types --no-fail-fast --quiet
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate proto (buf)
        run: |
          docker run --rm -v "$(pwd):/workspace" -w /workspace bufbuild/buf:latest generate

      - name: Tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./pkg/... ./services/... -count=1 -v
        env:
          # pkg/nats test skip if NATS not available
          NATS_URL: ""

      - name: Vet
        run: go vet ./...

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and test SDK
        run: |
          cd sdk/ts && npm ci && npm run build && npm test

  deploy-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deployments/public stack
        run: |
          cd deployments/public && docker compose build
