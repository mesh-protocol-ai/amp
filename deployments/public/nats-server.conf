# NATS Server configuration for AMP public endpoint
# Reference: https://docs.nats.io/nats-server/configuration

# ─── JetStream ──────────────────────────────────────────────────────────────
jetstream {
  store_dir: /data
  max_memory_store: 1GB
  max_file_store: 10GB
}

# ─── HTTP Monitoring ────────────────────────────────────────────────────────
http_port: 8222

# ─── Authentication ─────────────────────────────────────────────────────────
# Token is passed via docker-compose command line (from .env NATS_TOKEN).
# So no authorization block here; see compose command.

# ─── Connection limits ──────────────────────────────────────────────────────
max_connections: 500
max_payload: 1048576  # 1 MB per message
max_subscriptions: 100

# ─── Timeouts ───────────────────────────────────────────────────────────────
max_control_line: 4096
ping_interval: "2m"
ping_max: 2
write_deadline: "5s"

# ─── Cluster (disabled for MVP) ──────────────────────────────────────────────
# To scale, configure cluster { ... } to federate multiple NATS instances

# ─── Logging ─────────────────────────────────────────────────────────────────
debug: false
trace: false
logtime: true
